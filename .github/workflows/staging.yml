name: Deploy to Staging

on:
  push:
    branches: [develop]

jobs:
  deploy-frontend-staging:
    name: Frontend → Staging
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint — fail on design system violations (hardcoded hex, etc.)
        working-directory: frontend
        run: npm run lint

      - name: Build (staging)
        working-directory: frontend
        run: npm run build
        env:
          REACT_APP_BACKEND_URL: ${{ secrets.STAGING_BACKEND_URL }}
          REACT_APP_ENV: staging
          REACT_APP_SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          REACT_APP_VERSION: ${{ github.sha }}

      # Replace with your actual deploy step (Vercel / Netlify / S3)
      - name: Deploy to staging
        run: echo "Deploy build/ to staging host here"

  deploy-backend-staging:
    name: Backend → Staging
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy backend
        run: echo "SSH / Docker deploy to staging server here"
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
          SECRET_KEY: ${{ secrets.STAGING_SECRET_KEY }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          ENVIRONMENT: staging
