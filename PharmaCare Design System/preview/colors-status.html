<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body { margin: 0; padding: 16px; background: #fff; font-family: var(--font-sans); }
.grid { display: flex; flex-wrap: wrap; gap: 8px; }
.chip { padding: 6px 12px; border-radius: 9999px; font-size: 12px; font-weight: 500; }
.section { margin-bottom: 12px; }
.section-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: #9ca3af; margin-bottom: 6px; }
</style>
</head><body>
<div class="section">
  <div class="section-label">Payment & Billing</div>
  <div class="grid">
    <span class="chip" style="background:#f0fdf4;color:#15803d">Paid</span>
    <span class="chip" style="background:#f0fdf4;color:#15803d">Cash</span>
    <span class="chip" style="background:#fffbeb;color:#b45309">Due</span>
    <span class="chip" style="background:#fffbeb;color:#b45309">Partial</span>
    <span class="chip" style="background:#fffbeb;color:#b45309">Pending</span>
    <span class="chip" style="background:#fef2f2;color:#b91c1c">Overdue</span>
    <span class="chip" style="background:#fef2f2;color:#b91c1c">Cancelled</span>
    <span class="chip" style="background:#eff6ff;color:#1d4ed8">UPI</span>
    <span class="chip" style="background:#faf5ff;color:#7e22ce">Credit</span>
    <span class="chip" style="background:#faf5ff;color:#7e22ce">Card</span>
    <span class="chip" style="background:#f3f4f6;color:#374151">Draft</span>
  </div>
</div>
<div class="section">
  <div class="section-label">Customer Types</div>
  <div class="grid">
    <span class="chip" style="background:#eff6ff;color:#1d4ed8">Regular</span>
    <span class="chip" style="background:#faf5ff;color:#7e22ce">Wholesale</span>
    <span class="chip" style="background:#f0fdf4;color:#15803d">Institution</span>
  </div>
</div>
<div class="section">
  <div class="section-label">Team Roles</div>
  <div class="grid">
    <span class="chip" style="background:#faf5ff;color:#7e22ce">Admin</span>
    <span class="chip" style="background:#eff6ff;color:#1d4ed8">Manager</span>
    <span class="chip" style="background:#f0fdf4;color:#15803d">Cashier</span>
    <span class="chip" style="background:#fff7ed;color:#c2410c">Inventory</span>
  </div>
</div>
</body></html>
