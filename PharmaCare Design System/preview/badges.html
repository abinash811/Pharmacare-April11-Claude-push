<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body { margin: 0; padding: 16px; background: #fff; font-family: var(--font-sans); }
.label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: #9ca3af; margin-bottom: 8px; }
.row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
.badge { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 9999px; font-size: 12px; font-weight: 500; }
</style>
</head><body>
<div class="label">Payment Status</div>
<div class="row">
  <span class="badge" style="background:#f0fdf4;color:#15803d">Paid</span>
  <span class="badge" style="background:#f0fdf4;color:#15803d">Cash</span>
  <span class="badge" style="background:#fffbeb;color:#b45309">Due</span>
  <span class="badge" style="background:#fffbeb;color:#b45309">Partial</span>
  <span class="badge" style="background:#fffbeb;color:#b45309">Draft</span>
  <span class="badge" style="background:#fef2f2;color:#b91c1c">Overdue</span>
  <span class="badge" style="background:#fef2f2;color:#b91c1c">Cancelled</span>
  <span class="badge" style="background:#eff6ff;color:#1d4ed8">UPI</span>
  <span class="badge" style="background:#faf5ff;color:#7e22ce">Credit</span>
  <span class="badge" style="background:#faf5ff;color:#7e22ce">Card</span>
  <span class="badge" style="background:#f3f4f6;color:#374151">—</span>
</div>
<div class="label">Customer Type</div>
<div class="row">
  <span class="badge" style="background:#eff6ff;color:#1d4ed8">Regular</span>
  <span class="badge" style="background:#faf5ff;color:#7e22ce">Wholesale</span>
  <span class="badge" style="background:#f0fdf4;color:#15803d">Institution</span>
</div>
<div class="label">Roles</div>
<div class="row">
  <span class="badge" style="background:#faf5ff;color:#7e22ce">Admin</span>
  <span class="badge" style="background:#eff6ff;color:#1d4ed8">Manager</span>
  <span class="badge" style="background:#f0fdf4;color:#15803d">Cashier</span>
  <span class="badge" style="background:#fff7ed;color:#c2410c">Inventory</span>
</div>
</body></html>
