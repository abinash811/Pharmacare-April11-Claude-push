<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body { margin: 0; padding: 16px; background: #fff; }
.block { margin-bottom: 14px; }
.label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: #9ca3af; margin-bottom: 4px; }
.specimen { color: #111827; }
.weights { display: flex; gap: 20px; flex-wrap: wrap; }
.w { font-size: 13px; color: #374151; }
.w span { font-size: 10px; color: #9ca3af; display: block; }
</style>
</head><body>
<div class="block">
  <div class="label">IBM Plex Sans — Primary UI Font</div>
  <div class="specimen" style="font-family:'IBM Plex Sans',sans-serif;font-size:22px;font-weight:600;margin-bottom:6px;">PharmaCare Management</div>
  <div class="weights">
    <div class="w" style="font-family:'IBM Plex Sans',sans-serif;font-weight:300">Light 300<span>Aa Bb Cc</span></div>
    <div class="w" style="font-family:'IBM Plex Sans',sans-serif;font-weight:400">Regular 400<span>Aa Bb Cc</span></div>
    <div class="w" style="font-family:'IBM Plex Sans',sans-serif;font-weight:500">Medium 500<span>Aa Bb Cc</span></div>
    <div class="w" style="font-family:'IBM Plex Sans',sans-serif;font-weight:600">SemiBold 600<span>Aa Bb Cc</span></div>
    <div class="w" style="font-family:'IBM Plex Sans',sans-serif;font-weight:700">Bold 700<span>Aa Bb Cc</span></div>
  </div>
</div>
<div class="block">
  <div class="label">Manrope — Display / Heading Alt</div>
  <div class="specimen" style="font-family:'Manrope',sans-serif;font-size:22px;font-weight:700;margin-bottom:6px;">Pharmacy Dashboard</div>
  <div class="weights">
    <div class="w" style="font-family:'Manrope',sans-serif;font-weight:400">Regular 400<span>Aa Bb Cc</span></div>
    <div class="w" style="font-family:'Manrope',sans-serif;font-weight:600">SemiBold 600<span>Aa Bb Cc</span></div>
    <div class="w" style="font-family:'Manrope',sans-serif;font-weight:800">ExtraBold 800<span>Aa Bb Cc</span></div>
  </div>
</div>
</body></html>
