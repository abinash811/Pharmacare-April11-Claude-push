<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body { margin: 0; padding: 12px; background: #fff; font-family: var(--font-sans); }
.row { display: flex; gap: 0; }
.es {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  justify-content: center; padding: 24px 12px; text-align: center;
  border-right: 1px solid #f3f4f6;
}
.es:last-child { border-right: none; }
.icon-wrap { width: 52px; height: 52px; background: #f3f4f6; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; }
.es-title { font-size: 13px; font-weight: 500; color: #111827; margin-bottom: 4px; }
.es-desc  { font-size: 11px; color: #6b7280; max-width: 140px; line-height: 1.4; margin-bottom: 10px; }
</style>
</head><body>
<div class="row">
  <div class="es">
    <div class="icon-wrap">
      <svg width="22" height="22" fill="none" stroke="#9ca3af" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
    </div>
    <div class="es-title">No bills yet</div>
    <div class="es-desc">Create your first bill to get started</div>
    <button class="btn btn-primary" style="font-family:var(--font-sans);font-size:12px;padding:5px 12px;border-radius:6px;background:#4682B4;color:#fff;border:none;cursor:pointer;">+ New Bill</button>
  </div>
  <div class="es">
    <div class="icon-wrap">
      <svg width="22" height="22" fill="none" stroke="#9ca3af" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </div>
    <div class="es-title">No results for "amox"</div>
    <div class="es-desc">Try a different search term or check your spelling</div>
  </div>
  <div class="es">
    <div class="icon-wrap">
      <svg width="22" height="22" fill="none" stroke="#9ca3af" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    </div>
    <div class="es-title">Something went wrong</div>
    <div class="es-desc">We couldn't load the data. Please try again.</div>
    <button class="btn btn-outline" style="font-family:var(--font-sans);font-size:12px;padding:5px 12px;border-radius:6px;background:#fff;border:1px solid #e5e7eb;color:#374151;cursor:pointer;">Retry</button>
  </div>
</div>
</body></html>
