<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body { margin: 0; padding: 16px; background: #fff; font-family: var(--font-sans); }
.row { display: flex; gap: 8px; }
.item { flex: 1; }
.swatch { height: 48px; border-radius: 6px; border: 1px solid #e5e7eb; }
.label { font-size: 11px; color: var(--fg-muted); margin-top: 4px; font-weight: 500; }
.hex { font-size: 10px; color: var(--fg-subtle); font-family: var(--font-mono); }
</style>
</head><body>
<div class="row">
  <div class="item">
    <div class="swatch" style="background:#f8f9fa;"></div>
    <div class="label">App BG</div><div class="hex">#f8f9fa</div>
  </div>
  <div class="item">
    <div class="swatch" style="background:#ffffff;"></div>
    <div class="label">Surface</div><div class="hex">#ffffff</div>
  </div>
  <div class="item">
    <div class="swatch" style="background:#f3f4f6;"></div>
    <div class="label">Muted BG</div><div class="hex">#f3f4f6</div>
  </div>
  <div class="item">
    <div class="swatch" style="background:#e5e7eb;"></div>
    <div class="label">Border</div><div class="hex">#e5e7eb</div>
  </div>
  <div class="item">
    <div class="swatch" style="background:#111827;"></div>
    <div class="label">FG Primary</div><div class="hex">#111827</div>
  </div>
  <div class="item">
    <div class="swatch" style="background:#374151;"></div>
    <div class="label">FG Body</div><div class="hex">#374151</div>
  </div>
  <div class="item">
    <div class="swatch" style="background:#6b7280;"></div>
    <div class="label">FG Muted</div><div class="hex">#6b7280</div>
  </div>
  <div class="item">
    <div class="swatch" style="background:#9ca3af;"></div>
    <div class="label">FG Subtle</div><div class="hex">#9ca3af</div>
  </div>
</div>
</body></html>
