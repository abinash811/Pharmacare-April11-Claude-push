// ── Shared UI Components ──────────────────────────────────────────────────────

function Badge({ status }) {
  const map = {
    paid:      { bg:'#f0fdf4', color:'#15803d', label:'Paid' },
    cash:      { bg:'#f0fdf4', color:'#15803d', label:'Cash' },
    active:    { bg:'#f0fdf4', color:'#15803d', label:'Active' },
    due:       { bg:'#fffbeb', color:'#b45309', label:'Due' },
    partial:   { bg:'#fffbeb', color:'#b45309', label:'Partial' },
    pending:   { bg:'#fffbeb', color:'#b45309', label:'Pending' },
    draft:     { bg:'#fffbeb', color:'#b45309', label:'Draft' },
    overdue:   { bg:'#fef2f2', color:'#b91c1c', label:'Overdue' },
    cancelled: { bg:'#fef2f2', color:'#b91c1c', label:'Cancelled' },
    upi:       { bg:'#eff6ff', color:'#1d4ed8', label:'UPI' },
    credit:    { bg:'#faf5ff', color:'#7e22ce', label:'Credit' },
    card:      { bg:'#faf5ff', color:'#7e22ce', label:'Card' },
    regular:   { bg:'#eff6ff', color:'#1d4ed8', label:'Regular' },
    wholesale: { bg:'#faf5ff', color:'#7e22ce', label:'Wholesale' },
    low:       { bg:'#fef2f2', color:'#b91c1c', label:'Low Stock' },
    ok:        { bg:'#f0fdf4', color:'#15803d', label:'In Stock' },
  };
  const s = map[status] || { bg:'#f3f4f6', color:'#374151', label: status || '—' };
  return (
    <span style={{
      background: s.bg, color: s.color,
      padding:'2px 10px', borderRadius:9999, fontSize:11, fontWeight:500,
      display:'inline-block', whiteSpace:'nowrap',
    }}>{s.label}</span>
  );
}

function Btn({ children, variant='primary', size='md', onClick, style={} }) {
  const base = {
    display:'inline-flex', alignItems:'center', justifyContent:'center', gap:6,
    fontFamily:'IBM Plex Sans, sans-serif', fontWeight:600, cursor:'pointer',
    border:'none', borderRadius:8, transition:'all 0.15s ease',
    fontSize: size==='sm' ? 12 : 14,
    padding: size==='sm' ? '5px 12px' : size==='lg' ? '10px 24px' : '7px 16px',
  };
  const vars = {
    primary:   { background: C.brand, color:'#fff' },
    secondary: { background:'#f3f4f6', color:'#374151' },
    outline:   { background:'#fff', color:'#374151', border:'1px solid #e5e7eb' },
    danger:    { background:'#dc2626', color:'#fff' },
    ghost:     { background:'transparent', color:'#4b5563' },
  };
  return (
    <button onClick={onClick} style={{ ...base, ...vars[variant], ...style }}
      onMouseEnter={e => e.currentTarget.style.transform='translateY(-1px)'}
      onMouseLeave={e => e.currentTarget.style.transform='translateY(0)'}
      onMouseDown={e => e.currentTarget.style.transform='translateY(0)'}
    >{children}</button>
  );
}

function Input({ placeholder, value, onChange, style={} }) {
  return (
    <input
      placeholder={placeholder} value={value} onChange={onChange}
      style={{
        height:36, padding:'0 12px', borderRadius:8, border:'1px solid #e5e7eb',
        fontSize:13, fontFamily:'IBM Plex Sans, sans-serif', color:'#111827',
        outline:'none', background:'#fff', width:'100%', ...style,
      }}
    />
  );
}

function Card({ children, style={} }) {
  return (
    <div style={{
      background:'#fff', border:'1px solid #e5e7eb', borderRadius:8,
      boxShadow:'0 1px 2px rgba(0,0,0,0.05)', ...style,
    }}>{children}</div>
  );
}

function PageHeader({ title, subtitle, actions }) {
  return (
    <div style={{
      background:'#fff', borderBottom:'1px solid #e5e7eb',
      boxShadow:'0 1px 2px rgba(0,0,0,0.05)',
      padding:'14px 32px', display:'flex', alignItems:'center', justifyContent:'space-between',
      flexShrink:0,
    }}>
      <div>
        <h1 style={{fontSize:20, fontWeight:700, color:'#111827', lineHeight:1.2}}>{title}</h1>
        {subtitle && <p style={{fontSize:11, color:'#6b7280', marginTop:2}}>{subtitle}</p>}
      </div>
      {actions && <div style={{display:'flex', gap:8}}>{actions}</div>}
    </div>
  );
}

function Tabs({ tabs, active, onChange }) {
  return (
    <div style={{
      background:'#fff', borderBottom:'1px solid #e5e7eb',
      padding:'0 32px', display:'flex', flexShrink:0,
    }}>
      {tabs.map(t => (
        <button key={t.key} onClick={() => onChange(t.key)}
          style={{
            padding:'10px 16px', fontSize:13, fontWeight:500,
            borderBottom: active===t.key ? `2px solid ${C.brand}` : '2px solid transparent',
            color: active===t.key ? C.brand : '#6b7280',
            background:'none', border:'none', borderBottom: active===t.key ? `2px solid ${C.brand}` : '2px solid transparent',
            cursor:'pointer', fontFamily:'IBM Plex Sans, sans-serif',
            display:'flex', alignItems:'center', gap:6, marginBottom:-1, transition:'all 0.15s',
          }}
        >
          {t.label}
          {t.count !== undefined && (
            <span style={{
              fontSize:10, padding:'1px 6px', borderRadius:9999, fontWeight:500,
              background: active===t.key ? 'rgba(70,130,180,0.10)' : '#f3f4f6',
              color: active===t.key ? C.brand : '#6b7280',
            }}>{t.count}</span>
          )}
        </button>
      ))}
    </div>
  );
}

// ── Sidebar ───────────────────────────────────────────────────────────────────

const NAV_GROUPS = [
  { label:'DAILY OPS', items:[
    { key:'dashboard', label:'Dashboard', icon:'dashboard' },
    { key:'billing',   label:'Billing',   icon:'billing'   },
    { key:'inventory', label:'Inventory', icon:'inventory' },
    { key:'purchases', label:'Purchases', icon:'purchases' },
  ]},
  { label:'RELATIONSHIPS', items:[
    { key:'customers', label:'Customers', icon:'customers' },
    { key:'suppliers', label:'Suppliers', icon:'suppliers' },
  ]},
  { label:'REPORTS', items:[
    { key:'reports',   label:'Reports',   icon:'reports'   },
  ]},
  { label:'ADMIN', items:[
    { key:'settings',  label:'Settings',  icon:'settings'  },
    { key:'team',      label:'Team',      icon:'team'      },
  ]},
];

function Sidebar({ page, onNav }) {
  return (
    <aside style={{
      width:200, background:C.sidebarBg, display:'flex', flexDirection:'column',
      flexShrink:0, height:'100%',
    }}>
      {/* Logo */}
      <div style={{
        display:'flex', alignItems:'center', gap:8,
        padding:'0 12px', height:56, borderBottom:'1px solid rgba(255,255,255,0.1)',
        flexShrink:0,
      }}>
        <div style={{
          width:28, height:28, background:C.brand, borderRadius:6,
          display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0,
        }}>
          <FlaskIcon size={15} color="#fff" />
        </div>
        <div>
          <div style={{fontSize:14, fontWeight:600, color:'#fff', lineHeight:1.2}}>PharmaCare</div>
          <div style={{fontSize:10, color:'#6b7280', lineHeight:1}}>v1.0</div>
        </div>
      </div>

      {/* Nav */}
      <nav style={{flex:1, overflowY:'auto', padding:'8px'}}>
        {NAV_GROUPS.map(g => (
          <div key={g.label}>
            <div style={{
              fontSize:10, fontWeight:500, textTransform:'uppercase',
              letterSpacing:'0.1em', color:'#6b7280',
              padding:'0 12px', marginTop:16, marginBottom:4,
            }}>{g.label}</div>
            {g.items.map(item => {
              const active = page === item.key;
              return (
                <button key={item.key} onClick={() => onNav(item.key)}
                  style={{
                    display:'flex', alignItems:'center', gap:10,
                    padding:'0 12px', height:36, borderRadius:8, width:'100%',
                    fontSize:13, fontWeight:500,
                    background: active ? 'rgba(37,99,235,0.20)' : 'transparent',
                    color: active ? '#fff' : '#d1d5db',
                    border:'none', cursor:'pointer', textAlign:'left',
                    marginBottom:2, transition:'all 0.15s', fontFamily:'IBM Plex Sans, sans-serif',
                  }}
                  onMouseEnter={e => { if (!active) { e.currentTarget.style.background='rgba(255,255,255,0.05)'; e.currentTarget.style.color='#fff'; }}}
                  onMouseLeave={e => { if (!active) { e.currentTarget.style.background='transparent'; e.currentTarget.style.color='#d1d5db'; }}}
                >
                  <svg width={16} height={16} viewBox="0 0 24 24" fill="none"
                    stroke={active ? '#fff' : '#9ca3af'} strokeWidth={2}
                    strokeLinecap="round" strokeLinejoin="round" style={{flexShrink:0}}>
                    <path d={icons[item.icon]}/>
                  </svg>
                  {item.label}
                </button>
              );
            })}
          </div>
        ))}
      </nav>

      {/* User footer */}
      <div style={{borderTop:'1px solid rgba(255,255,255,0.1)', padding:12}}>
        <div style={{display:'flex', alignItems:'center', gap:8, marginBottom:8}}>
          <div style={{
            width:28, height:28, borderRadius:'50%',
            background:'rgba(255,255,255,0.10)',
            display:'flex', alignItems:'center', justifyContent:'center',
            fontSize:11, fontWeight:600, color:'#d1d5db', flexShrink:0,
          }}>A</div>
          <div>
            <div style={{fontSize:13, fontWeight:500, color:'#fff', lineHeight:1.2}}>Admin User</div>
            <span style={{
              fontSize:10, fontWeight:500, padding:'1px 6px', borderRadius:9999,
              background:'#faf5ff', color:'#7e22ce',
            }}>Admin</span>
          </div>
        </div>
        <button style={{
          display:'flex', alignItems:'center', gap:8, padding:'0 12px', height:32,
          borderRadius:8, fontSize:13, fontWeight:500, color:'#9ca3af',
          background:'none', border:'none', cursor:'pointer', width:'100%',
          fontFamily:'IBM Plex Sans, sans-serif', transition:'all 0.15s',
        }}
          onMouseEnter={e => { e.currentTarget.style.background='rgba(255,255,255,0.05)'; e.currentTarget.style.color='#fff'; }}
          onMouseLeave={e => { e.currentTarget.style.background='transparent'; e.currentTarget.style.color='#9ca3af'; }}
        >
          <svg width={14} height={14} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={2} strokeLinecap="round" strokeLinejoin="round"><path d={icons.logout}/></svg>
          Logout
        </button>
      </div>
    </aside>
  );
}

// ── Auth Page ─────────────────────────────────────────────────────────────────

function AuthPage({ onLogin }) {
  const [email, setEmail] = useState('admin@pharmacy.com');
  const [pass, setPass] = useState('password123');
  const [loading, setLoading] = useState(false);

  const handleSubmit = (e) => {
    e.preventDefault();
    setLoading(true);
    setTimeout(() => { setLoading(false); onLogin(); }, 800);
  };

  return (
    <div style={{
      minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center',
      padding:16, background:'linear-gradient(135deg, #667eea 0%, #764ba2 100%)',
    }}>
      <div style={{
        width:'100%', maxWidth:400, background:'#fff', borderRadius:12,
        boxShadow:'0 20px 60px rgba(0,0,0,0.2)',
      }}>
        <div style={{padding:'32px 32px 24px', textAlign:'center'}}>
          <div style={{
            width:64, height:64, background:C.brand, borderRadius:14,
            display:'flex', alignItems:'center', justifyContent:'center', margin:'0 auto 16px',
          }}>
            <FlaskIcon size={36} color="#fff" />
          </div>
          <h1 style={{fontSize:24, fontWeight:700, color:'#111827', marginBottom:4}}>PharmaCare</h1>
          <p style={{fontSize:13, color:'#6b7280'}}>Pharmacy Management System</p>
        </div>
        <div style={{padding:'0 32px 32px'}}>
          <form onSubmit={handleSubmit}>
            <div style={{marginBottom:16}}>
              <label style={{fontSize:13, fontWeight:500, color:'#374151', display:'block', marginBottom:6}}>Email</label>
              <Input value={email} onChange={e=>setEmail(e.target.value)} placeholder="admin@pharmacy.com" />
            </div>
            <div style={{marginBottom:20}}>
              <label style={{fontSize:13, fontWeight:500, color:'#374151', display:'block', marginBottom:6}}>Password</label>
              <Input value={pass} onChange={e=>setPass(e.target.value)} placeholder="••••••••" style={{}} />
            </div>
            <button type="submit" style={{
              width:'100%', height:40, background: loading ? '#6b9fca' : C.brand, color:'#fff',
              border:'none', borderRadius:8, fontSize:14, fontWeight:600,
              cursor: loading ? 'not-allowed' : 'pointer', fontFamily:'IBM Plex Sans, sans-serif',
              transition:'background 0.15s',
            }}>{loading ? 'Logging in…' : 'Login'}</button>
          </form>
          <div style={{margin:'20px 0', display:'flex', alignItems:'center', gap:12}}>
            <div style={{flex:1, height:1, background:'#e5e7eb'}}/>
            <span style={{fontSize:11, color:'#9ca3af', textTransform:'uppercase', letterSpacing:'0.05em'}}>Or continue with</span>
            <div style={{flex:1, height:1, background:'#e5e7eb'}}/>
          </div>
          <button style={{
            width:'100%', height:40, background:'#fff', color:'#374151',
            border:'1px solid #e5e7eb', borderRadius:8, fontSize:14, fontWeight:500,
            cursor:'pointer', fontFamily:'IBM Plex Sans, sans-serif',
            display:'flex', alignItems:'center', justifyContent:'center', gap:8,
          }}>
            <svg width={18} height={18} viewBox="0 0 24 24">
              <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
              <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
              <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
              <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Sign in with Google

  { sku:'INS-GL',  name:'Insulin Glargine',   brand:'Sanofi', category:'Antidiabetic', stock:45,  minStock:20,  mrp:960.00,batch:'B2024-07', expiry:'May 2025', status:'ok'  },
  { sku:'ASP-75',  name:'Aspirin 75mg',       brand:'Bayer',  category:'Cardiac',      stock:190, minStock:50,  mrp:6.50,  batch:'B2024-11', expiry:'Jul 2025', status:'ok'  },
];

function InventorySearch() {
  const [search, setSearch] = useState('');
  const [catFilter, setCatFilter] = useState('all');

  const cats = ['all', ...new Set(INVENTORY.map(i=>i.category))];
  const filtered = INVENTORY.filter(i => {
    const q = search.toLowerCase();
    const matchSearch = !q || i.name.toLowerCase().includes(q) || i.sku.toLowerCase().includes(q) || i.brand.toLowerCase().includes(q);
    const matchCat = catFilter==='all' || i.category===catFilter;
    return matchSearch && matchCat;
  });

  const TH = ({children, w}) => (
    <th style={{padding:'10px 12px', fontSize:11, fontWeight:600, color:'#6b7280', textAlign:'left', width:w, borderBottom:'1px solid #e5e7eb', background:'#f9fafb', textTransform:'uppercase', letterSpacing:'0.04em'}}>{children}</th>
  );

  return (
    <div style={{display:'flex', flexDirection:'column', height:'100%', overflow:'hidden'}}>
      <PageHeader title="Inventory" subtitle={`${INVENTORY.length} products · ₹3.8L stock value`}
        actions={<>
          <Btn variant="outline" size="sm">Import CSV</Btn>
          <Btn size="sm">+ Add Product</Btn>
        </>}
      />
      <div style={{padding:'12px 32px', background:'#fff', borderBottom:'1px solid #e5e7eb', display:'flex', gap:12, alignItems:'center', flexShrink:0}}>
        <div style={{position:'relative', flex:1, maxWidth:360}}>
          <svg style={{position:'absolute', left:10, top:'50%', transform:'translateY(-50%)', pointerEvents:'none'}}
            width={14} height={14} viewBox="0 0 24 24" fill="none" stroke="#9ca3af" strokeWidth={2} strokeLinecap="round" strokeLinejoin="round"><path d={icons.search}/></svg>
          <input placeholder="Search by name, SKU or brand…" value={search} onChange={e=>setSearch(e.target.value)}
            style={{width:'100%', height:34, padding:'0 10px 0 32px', borderRadius:8, border:'1px solid #e5e7eb', fontSize:13, fontFamily:'IBM Plex Sans, sans-serif', outline:'none'}}
          />
        </div>
        <div style={{display:'flex', gap:4}}>
          {cats.map(c => (
            <button key={c} onClick={()=>setCatFilter(c)}
              style={{
                padding:'5px 10px', borderRadius:6, fontSize:11, fontWeight:500, cursor:'pointer',
                background: catFilter===c ? C.brand : '#f3f4f6',
                color: catFilter===c ? '#fff' : '#374151',
                border:'none', fontFamily:'IBM Plex Sans, sans-serif', textTransform:'capitalize',
              }}
            >{c==='all' ? 'All' : c}</button>
          ))}
        </div>
      </div>
      <div style={{flex:1, overflow:'auto', padding:'0 32px 24px'}}>
        <table style={{width:'100%', borderCollapse:'collapse', marginTop:16}}>
          <thead>
            <tr>
              <TH w={90}>SKU</TH>
              <TH>Medicine</TH>
              <TH w={80}>Brand</TH>
              <TH w={110}>Category</TH>
              <TH w={80}>Stock</TH>
              <TH w={80}>MRP</TH>
              <TH w={80}>Expiry</TH>
              <TH w={90}>Status</TH>
              <TH w={80}>Actions</TH>
            </tr>
          </thead>
          <tbody>
            {filtered.map(item => (
              <tr key={item.sku}
                style={{cursor:'pointer', transition:'background 0.1s'}}
                onMouseEnter={e=>e.currentTarget.style.background='#f0f7ff'}
                onMouseLeave={e=>e.currentTarget.style.background='transparent'}
              >
                <td style={{padding:'11px 12px', fontSize:12, color:'#6b7280', fontFamily:'monospace', borderBottom:'1px solid #f3f4f6'}}>{item.sku}</td>
                <td style={{padding:'11px 12px', fontSize:13, fontWeight:500, color:'#111827', borderBottom:'1px solid #f3f4f6'}}>{item.name}</td>
                <td style={{padding:'11px 12px', fontSize:12, color:'#6b7280', borderBottom:'1px solid #f3f4f6'}}>{item.brand}</td>
                <td style={{padding:'11px 12px', fontSize:12, color:'#374151', borderBottom:'1px solid #f3f4f6'}}>{item.category}</td>
                <td style={{padding:'11px 12px', fontSize:13, fontWeight:item.stock<=item.minStock ? 700 : 400, color: item.stock<=item.minStock ? '#dc2626' : '#111827', borderBottom:'1px solid #f3f4f6'}}>{item.stock}</td>
                <td style={{padding:'11px 12px', fontSize:13, fontWeight:500, borderBottom:'1px solid #f3f4f6'}}>₹{item.mrp.toFixed(2)}</td>
                <td style={{padding:'11px 12px', fontSize:12, color:'#6b7280', borderBottom:'1px solid #f3f4f6'}}>{item.expiry}</td>
                <td style={{padding:'11px 12px', borderBottom:'1px solid #f3f4f6'}}><Badge status={item.status}/></td>
                <td style={{padding:'11px 12px', borderBottom:'1px solid #f3f4f6'}}>
                  <div style={{display:'flex', gap:4}}>
                    <button style={{padding:'3px 8px', borderRadius:6, border:'1px solid #e5e7eb', background:'#fff', fontSize:11, cursor:'pointer', color:'#374151'}}>Edit</button>
                    <button style={{padding:'3px 8px', borderRadius:6, border:'none', background:'transparent', fontSize:11, cursor:'pointer', color:'#6b7280'}}>View</button>
                  </div>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ── App Shell ─────────────────────────────────────────────────────────────────

function App() {
  const [authed, setAuthed] = useState(() => localStorage.getItem('pc_authed') === 'true');
  const [page, setPage] = useState(() => localStorage.getItem('pc_page') || 'dashboard');
  const [billingView, setBillingView] = useState('list'); // 'list' | 'workspace'

  useEffect(() => { localStorage.setItem('pc_authed', authed); }, [authed]);
  useEffect(() => { localStorage.setItem('pc_page', page); }, [page]);

  if (!authed) return <AuthPage onLogin={() => setAuthed(true)} />;

  const nav = (p) => { setPage(p); setBillingView('list'); };

  const renderPage = () => {
    switch(page) {
      case 'dashboard': return <Dashboard onNav={nav} />;
      case 'billing':
        return billingView === 'workspace'
          ? <BillingWorkspace onBack={() => setBillingView('list')} />
          : <BillingList onNewBill={() => setBillingView('workspace')} />;
      case 'inventory': return <InventorySearch />;
      default:
        return (
          <div style={{display:'flex', flexDirection:'column', height:'100%', overflow:'auto'}}>
            <PageHeader title={page.charAt(0).toUpperCase()+page.slice(1)} subtitle="Coming soon in this prototype" />
            <div style={{flex:1, display:'flex', alignItems:'center', justifyContent:'center', flexDirection:'column', gap:12}}>
              <div style={{width:56, height:56, background:'#f3f4f6', borderRadius:'50%', display:'flex', alignItems:'center', justifyContent:'center'}}>
                <svg width={24} height={24} viewBox="0 0 24 24" fill="none" stroke="#9ca3af" strokeWidth={2} strokeLinecap="round" strokeLinejoin="round"><path d={icons[page] || icons.reports}/></svg>
              </div>
              <div style={{fontSize:14, fontWeight:500, color:'#374151'}}>This screen is not included in the prototype</div>
              <div style={{fontSize:12, color:'#6b7280'}}>Navigate to Dashboard, Billing, or Inventory to explore</div>
            </div>
          </div>
        );
    }
  };

  return (
    <div style={{display:'flex', height:'100vh', overflow:'hidden', background:'#f8f9fa'}}>
      <Sidebar page={page} onNav={nav} />
      <main style={{flex:1, display:'flex', flexDirection:'column', overflow:'hidden', background:'#f8f9fa'}}>
        {renderPage()}
      </main>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
