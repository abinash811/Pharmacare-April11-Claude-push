<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body { margin: 0; padding: 0; background: #f8f9fa; font-family: var(--font-sans); height: 100vh; }
.sidebar {
  width: 200px; height: 100vh; background: #1a2332;
  display: flex; flex-direction: column;
}
.logo-strip {
  display: flex; align-items: center; gap: 8px;
  padding: 0 12px; height: 56px; border-bottom: 1px solid rgba(255,255,255,0.1);
  flex-shrink: 0;
}
.logo-box {
  width: 28px; height: 28px; background: #4682B4;
  border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.logo-box svg { width: 16px; height: 16px; color: white; stroke: white; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
.logo-name { font-size: 14px; font-weight: 600; color: #fff; line-height: 1.2; }
.logo-ver  { font-size: 10px; color: #6b7280; line-height: 1; }
nav { flex: 1; overflow-y: auto; padding: 8px; }
.group-label {
  font-size: 10px; font-weight: 500; text-transform: uppercase;
  letter-spacing: 0.1em; color: #6b7280; padding: 0 12px;
  margin-top: 16px; margin-bottom: 4px;
}
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 0 12px; height: 36px; border-radius: 8px;
  font-size: 13px; font-weight: 500; color: #d1d5db;
  cursor: pointer; transition: all 0.2s; margin-bottom: 2px;
  text-decoration: none;
}
.nav-item:hover { background: rgba(255,255,255,0.05); color: #fff; }
.nav-item.active { background: rgba(37,99,235,0.20); color: #fff; }
.nav-icon { width: 16px; height: 16px; opacity: 0.7; flex-shrink: 0; }
.nav-item.active .nav-icon { opacity: 1; }
.user-footer {
  border-top: 1px solid rgba(255,255,255,0.1);
  padding: 12px;
}
.user-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.avatar { width: 28px; height: 28px; border-radius: 50%; background: rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; color: #d1d5db; font-size: 11px; font-weight: 600; flex-shrink: 0; }
.user-name { font-size: 13px; font-weight: 500; color: #fff; }
.role-badge { font-size: 10px; font-weight: 500; padding: 1px 6px; border-radius: 9999px; background: #faf5ff; color: #7e22ce; }
.logout-btn { display: flex; align-items: center; gap: 8px; padding: 0 12px; height: 32px; border-radius: 8px; font-size: 13px; font-weight: 500; color: #9ca3af; cursor: pointer; transition: all 0.2s; background: none; border: none; width: 100%; font-family: var(--font-sans); }
.logout-btn:hover { color: #fff; background: rgba(255,255,255,0.05); }
</style>
</head><body>
<div class="sidebar">
  <div class="logo-strip">
    <div class="logo-box">
      <svg viewBox="0 0 24 24"><path d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"/></svg>
    </div>
    <div>
      <div class="logo-name">PharmaCare</div>
      <div class="logo-ver">v1.0</div>
    </div>
  </div>
  <nav>
    <div class="group-label">DAILY OPS</div>
    <a class="nav-item active" href="#">
      <svg class="nav-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      Dashboard
    </a>
    <a class="nav-item" href="#">
      <svg class="nav-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 001.98 1.61h9.72a2 2 0 001.98-1.61L23 6H6"/></svg>
      Billing
    </a>
    <a class="nav-item" href="#">
      <svg class="nav-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/></svg>
      Inventory
    </a>
    <a class="nav-item" href="#">
      <svg class="nav-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
      Purchases
    </a>
    <div class="group-label">RELATIONSHIPS</div>
    <a class="nav-item" href="#">
      <svg class="nav-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
      Customers
    </a>
    <a class="nav-item" href="#">
      <svg class="nav-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
      Suppliers
    </a>
    <div class="group-label">REPORTS</div>
    <a class="nav-item" href="#">
      <svg class="nav-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
      Reports
    </a>
    <div class="group-label">ADMIN</div>
    <a class="nav-item" href="#">
      <svg class="nav-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93l-1.41 1.41M4.93 4.93l1.41 1.41M12 2v2M12 20v2M20 12h2M2 12h2M19.07 19.07l-1.41-1.41M4.93 19.07l1.41-1.41"/></svg>
      Settings
    </a>
  </nav>
  <div class="user-footer">
    <div class="user-row">
      <div class="avatar">A</div>
      <div>
        <div class="user-name">Admin User</div>
        <span class="role-badge">Admin</span>
      </div>
    </div>
    <button class="logout-btn">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Logout
    </button>
  </div>
</div>
</body></html>
